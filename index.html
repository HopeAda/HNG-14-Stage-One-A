<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="styles.css">
   <title>HNG Stage 0 | Todo Card Component</title>
</head>

<body>
   <article class="root-card" data-testid="test-todo-card">
      <section>
         <input type="checkbox" name="check" id="check" class="check" data-testid="test-todo-complete-toggle">
         <h2 class="title" data-testid="test-todo-title">Play a game</h2>
         <span class="priority-badge" data-testid="test-todo-priority">High</span>
      </section>
      <p class="desc" data-testid="test-todo-description">Lorem ipsum dolor sit amet consectetur adipisicing elit.
         Architecto quos eaque quod porro voluptas provident veritatis et praesentium exercitationem laborum.</p>
      <section>
         <time datetime="" data-testid="test-todo-due-date">16th April, 2026</time>
         <span class="time-remaining" data-testid="test-todo-time-remaining">Due in 3 days</span>
      </section>
      <div class="status" data-testid="test-todo-status"></div>
      <ul role="list" class="tags" data-testid="test-todo-tags">
         <li data-testid="test-todo-tag-work">work</li>
         <li data-testid="test-todo-tag-urgent">urgent</li>
      </ul>
      <button class="edit" data-testid="test-todo-edit-button">Edit</button>
      <button class="delete" data-testid="test-todo-delete-button">Delete</button>


   </article>
   <script src="index.js"></script>
</body>

</html>
